<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电商客服 Agent 知识库 v1.1</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255,255,255,0.94);
      --card: #ffffff;
      --text: #221815;
      --muted: #8f7f78;
      --line: rgba(255, 111, 97, 0.12);
      --primary: #ff4d4f;
      --primary-2: #ff7a45;
      --accent: #ff2e63;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ececef 0%, #f8f8fa 100%);
      overflow-x: hidden;
      overflow-y: auto;
    }

    .app {
      width: min(100vw, 430px);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
    }

    .mobile-topbar {
      display: flex;
    }

    .stage {
      background: var(--panel);
      backdrop-filter: blur(20px);
      border: none;
      border-radius: 0;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .faq-panel {
      margin: 10px 12px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #fff, #fff7f4);
    }

    .faq-panel.inline {
      margin: 0 14px 12px;
    }

    .quick-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 10px 8px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .quick-row::-webkit-scrollbar { display: none; }

    .quick-pill {
      flex: 0 0 auto;
      border: 1px solid rgba(255,77,79,0.12);
      background: linear-gradient(180deg, #fff, #fff7f6);
      border-radius: 16px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #5c423c;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(255,93,93,0.04);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .quick-pill:first-child {
      margin-left: 2px;
    }

    .quick-pill:active {
      background: #fff0ec;
      transform: scale(0.98);
    }

    .quick-pill::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 0 0 4px rgba(255,77,79,0.08);
      flex-shrink: 0;
    }

    .faq-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .faq-head .title {
      font-size: 14px;
      font-weight: 700;
    }

    .faq-head .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .faq-switch {
      border: none;
      border-radius: 999px;
      background: rgba(255,93,93,0.08);
      color: var(--accent);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .faq-list {
      display: grid;
      gap: 10px;
    }

    .faq-panel.inline .faq-list {
      max-height: 288px;
      overflow: hidden;
    }

    .faq-item {
      display: block;
      width: 100%;
      border: 1px solid rgba(255,93,93,0.12);
      border-radius: 18px;
      background: white;
      padding: 12px 14px;
      cursor: pointer;
      text-align: left;
      font: inherit;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .faq-item:hover {
      transform: translateY(-1px);
      border-color: rgba(255,93,93,0.28);
      box-shadow: 0 10px 24px rgba(255,93,93,0.08);
    }

    .faq-item:active {
      transform: translateY(0);
      background: #fff8f7;
    }

    .faq-q {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
    }

    .faq-a {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .profile {
      display: none;
    }

    .profile .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff8a5c, #ff5d5d);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
    }

    .profile .meta strong { display: block; font-size: 14px; }
    .profile .meta span { font-size: 12px; color: var(--muted); }

    .stage {
      display: flex;
      flex-direction: column;
      min-width: 0;
      flex: 1;
    }

    .topbar {
      padding: 14px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: rgba(255,255,255,0.96);
    }

    .topbar h2 { font-size: 16px; }
    .topbar .subtitle { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .live {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,93,93,0.08);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 0 6px rgba(255,45,99,0.12);
    }

    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 132px;
      scroll-behavior: smooth;
    }

    .post {
      max-width: 100%;
      margin: 0 0 14px;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
      animation: rise .28s ease;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px 6px;
    }

    .post-head .avatar {
      width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center;
      font-weight: 800; color: white;
      background: linear-gradient(135deg, #ff4d4f, #ff7a45);
      flex-shrink: 0;
    }

    .post-head .who strong { display: block; font-size: 14px; }
    .post-head .who span { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }

    .bubble {
      padding: 0;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user { color: var(--text); }
    .bubble.bot { color: #2f2722; }

    .bubble-wrap {
      display: inline-block;
      max-width: min(85%, 320px);
      margin: 0 14px 14px;
      padding: 11px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    }

    .bubble-wrap.bot {
      background: white;
      border: 1px solid rgba(0,0,0,0.05);
      border-top-left-radius: 8px;
      align-self: flex-start;
    }

    .bubble-wrap.user {
      background: linear-gradient(135deg, #ff4d4f, #ff7a45);
      color: white;
      border-top-right-radius: 8px;
      align-self: flex-end;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      padding: 0 14px 14px;
    }

    .media {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
      background: #fff;
      position: relative;
    }

    .media img, .media video {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #f6f6f6;
    }

    .media .caption {
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid rgba(0,0,0,0.04);
      background: #fffdfc;
    }

    .audio-wrap {
      padding: 0 14px 14px;
    }

    .audio-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, #fff7f5, #fff);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .audio-badge {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #ff5d5d, #ff8a5c);
      color: white; display: grid; place-items: center;
      flex-shrink: 0;
    }

    .audio-box audio { width: 100%; }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 2px 0;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: #ff7a7a; animation: bounce 1.1s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.72); opacity: .45; } 40% { transform: scale(1); opacity: 1; } }

    .toolbar {
      padding: 10px 10px 12px;
      border-top: 1px solid rgba(0,0,0,0.05);
      background: rgba(255,255,255,0.98);
    }

    .attachments {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,93,93,0.14);
      background: white;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #503935;
    }

    .chip.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      border-color: transparent;
      color: white;
      font-weight: 700;
    }

    .chip.recording {
      background: rgba(255,45,99,0.1);
      color: var(--accent);
      border-color: rgba(255,45,99,0.16);
    }

    .composer {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .composer-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .switch-icon {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 50%;
      background: white;
      display: grid;
      place-items: center;
      color: #222;
      font-size: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .composer textarea {
      flex: 1;
      min-height: 44px;
      max-height: 130px;
      resize: none;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 10px 14px;
      font: inherit;
      font-size: 13px;
      outline: none;
      background: white;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }

    .composer textarea:focus { border-color: rgba(255,93,93,0.4); box-shadow: 0 0 0 4px rgba(255,93,93,0.06); }

    .composer-tools {
      margin-left: auto;
      position: relative;
    }

    .more-btn {
      border: 1px solid rgba(255,93,93,0.14);
      background: white;
      color: #503935;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .composer-menu {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      display: none;
      min-width: 140px;
      padding: 8px;
      border-radius: 16px;
      background: rgba(255,255,255,0.98);
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 14px 30px rgba(0,0,0,0.10);
      z-index: 20;
    }

    .composer-menu.open { display: grid; gap: 6px; }

    .menu-item {
      border: none;
      background: #fff7f6;
      color: #503935;
      padding: 10px 12px;
      border-radius: 12px;
      text-align: left;
      font-size: 12px;
      cursor: pointer;
    }

    .menu-item:hover {
      background: #ffe9e4;
    }

    .menu-item:active {
      background: #ffdcd2;
      transform: scale(0.99);
    }

    .voice-trigger {
      flex: 1;
      min-height: 44px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      background: white;
      color: #111;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: none;
    }

    .composer.voice-mode textarea {
      display: none;
    }

    .composer.voice-mode .voice-trigger {
      display: flex;
    }

    .voice-trigger.recording {
      background: #f5f5f5;
      border-color: rgba(0,0,0,0.14);
      color: #333;
    }

    .send {
      width: 50px; height: 50px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white; cursor: pointer; font-size: 18px; font-weight: 800;
      box-shadow: 0 12px 24px rgba(255,93,93,0.22);
    }
    .send:disabled { opacity: .5; cursor: not-allowed; }

    .preview-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .preview {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
      background: #fff;
    }
    .preview img, .preview audio, .preview video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .preview .remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px; height: 24px;
      border: none; border-radius: 50%;
      background: rgba(0,0,0,0.62);
      color: white; cursor: pointer;
      line-height: 1;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      body { overflow-y: auto; }
      .app {
        width: min(100vw, 430px);
        min-height: 100dvh;
        padding: 0;
        gap: 0;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 12px 12px 10px;
        border-radius: 0;
      }
      .feed {
        padding: 12px 10px 126px;
        min-height: 0;
      }
      .post {
        max-width: 100%;
        border-radius: 18px;
      }
      .toolbar {
        position: sticky;
        bottom: 0;
        z-index: 12;
        padding: 10px 10px 12px;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
        box-shadow: 0 -12px 30px rgba(0,0,0,0.05);
      }
      .faq-panel {
        margin: 10px 10px 0;
        padding: 12px;
      }
      .preview-row {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 4px;
      }
      .desktop-topbar { display: none; }
      .mobile-topbar { display: flex; }
      .sidebar { display: none; }
    }

    @media (max-width: 640px) {
      .topbar h2 { font-size: 15px; }
      .topbar .subtitle { font-size: 11px; }
      .live { padding: 8px 10px; }
      .faq-panel {
        margin: 8px 10px 0;
        padding: 10px;
      }
      .faq-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .faq-switch { align-self: flex-start; }
      .composer { flex-wrap: nowrap; }
      .composer textarea { min-height: 42px; border-radius: 14px; }
      .send { width: 42px; height: 42px; border-radius: 14px; flex-shrink: 0; }
      .media-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-row">
          <div class="logo">薯</div>
          <div>
            <h1>小红书风客服</h1>
            <p>图片、语音、文字都能发</p>
          </div>
        </div>
      </div>
      <div class="nav">
        <div class="nav-card"><strong>热门话题</strong><span>查订单 / 售后</span></div>
        <div class="nav-card"><strong>种草图文</strong><span>支持图片上传</span></div>
        <div class="nav-card"><strong>语音消息</strong><span>支持录音发送</span></div>
      </div>
      <div class="promo">
        <div class="title">知识库 v1.1 已接入</div>
        <div class="text">这版已合并项目背景、场景优先级、冷启动策略、自建架构、灰度上线、评测体系和安全护栏。上传图片后会显示卡片预览，语音会作为音频消息展示。</div>
      </div>
      <div class="profile">
        <div class="avatar">U</div>
        <div class="meta"><strong>用户中心</strong><span>在线 · 这条会话已开启</span></div>
      </div>
    </aside>

    <main class="stage">
      <div class="topbar mobile-topbar">
        <div>
          <h2>红薯客服</h2>
          <div class="subtitle">私信 · 在线客服 · 7×24</div>
        </div>
        <div class="live"><span class="dot"></span> Live</div>
      </div>

      <div class="feed" id="chatArea"></div>

      <div class="toolbar">
        <div class="quick-row" id="quickRow"></div>
        <input class="hidden" id="imageInput" type="file" accept="image/*" multiple>
        <input class="hidden" id="fileInput" type="file" multiple>
        <div class="composer" id="composerBox">
          <button class="switch-icon" type="button" id="leftSwitchBtn" onclick="toggleLeftInputIcon()">⌨</button>
          <div class="composer-left">
            <textarea id="msgInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="voice-trigger" id="voiceTrigger" type="button">按住 说话</button>
          </div>
          <button class="send" id="sendBtn" onclick="sendMsg()">➤</button>
          <div class="composer-tools">
            <button class="more-btn" type="button" onclick="toggleComposerMenu()">＋</button>
            <div class="composer-menu" id="composerMenu">
              <button class="menu-item" type="button" onclick="pickImages()">上传图片</button>
              <button class="menu-item" type="button" onclick="pickFiles()">上传文件</button>
            </div>
          </div>
        </div>
        <div class="preview-row" id="previewRow"></div>
      </div>
    </main>
  </div>

  <script>
    const API = location.protocol === 'file:'
      ? 'https://cs-agent-ashy.vercel.app/api/chat'
      : '/api/chat';
    const chatArea = document.getElementById('chatArea');
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageInput = document.getElementById('imageInput');
    const fileInput = document.getElementById('fileInput');
    const previewRow = document.getElementById('previewRow');
    let faqList = null;
    const quickRow = document.getElementById('quickRow');
    const composerBox = document.getElementById('composerBox');
    const composerMenu = document.getElementById('composerMenu');
    const voiceTrigger = document.getElementById('voiceTrigger');

    let sessionId = 'user_' + Date.now();
    let attachments = [];
    let recorder = null;
    let recordedChunks = [];
    let recording = false;
    let faqBatchIndex = 0;
    let inputMode = 'text';

    const FAQ_BATCHES = [
      [
        { q: '我的订单到哪了？', a: '查订单状态' },
        { q: '我的快递到哪了？', a: '查物流轨迹' },
        { q: '怎么申请退款？', a: '查退款流程' }
      ],
      [
        { q: '退款什么时候到账？', a: '查退款进度' },
        { q: '订单显示已签收但我没收到怎么办？', a: '查签收异常' },
        { q: '快递破损了怎么办？', a: '查售后处理' }
      ],
      [
        { q: '商品发错了怎么处理？', a: '查错发售后' },
        { q: '为什么物流信息不更新？', a: '查物流延迟' },
        { q: '七天无理由退货怎么操作？', a: '查退货规则' }
      ]
    ];

    const QUICK_REPLIES = ['查订单状态', '查物流', '查退款进度', '转人工'];

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 130) + 'px';
    }

    input.addEventListener('input', autoResize);

    function pickImages() { imageInput.click(); }
    function pickFiles() { fileInput.click(); }

    function toggleComposerMenu() {
      composerMenu.classList.toggle('open');
    }

    function toggleLeftInputIcon() {
      setInputMode(inputMode === 'text' ? 'voice' : 'text');
    }

    document.addEventListener('click', (e) => {
      if (!composerMenu.contains(e.target) && !e.target.closest('.more-btn')) {
        composerMenu.classList.remove('open');
      }
    });

    function setInputMode(mode) {
      inputMode = mode;
      composerBox.classList.toggle('voice-mode', mode === 'voice');
      leftSwitchBtn.textContent = mode === 'text' ? '⌨' : '🎤';
      composerMenu.classList.remove('open');
      if (mode === 'voice') {
        input.blur();
      } else {
        input.focus();
      }
    }

    let voicePressTimer = null;
    let voicePressStarted = false;

    function mountFaqPanel(afterNode) {
      const panel = document.createElement('div');
      panel.className = 'faq-panel inline';
      panel.innerHTML = `
        <div class="faq-head">
          <div>
            <div class="title">常见问答</div>
            <div class="hint">先看这批高频问题，点一下就能直接发给客服</div>
          </div>
          <button class="faq-switch" type="button" onclick="switchFaqBatch()">换一批</button>
        </div>
        <div class="faq-list" id="faqList"></div>
      `;
      afterNode.insertAdjacentElement('afterend', panel);
      faqList = panel.querySelector('#faqList');
    }

    function renderFaqBatch() {
      const batch = FAQ_BATCHES[faqBatchIndex % FAQ_BATCHES.length];
      faqList.innerHTML = '';
      batch.forEach((item, idx) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'faq-item';
        button.innerHTML = `
          <div class="faq-q">${idx + 1}. ${escapeHtml(item.q)}</div>
          <div class="faq-a">${escapeHtml(item.a)}</div>
        `;
        button.addEventListener('click', () => sendQuick(item.q));
        faqList.appendChild(button);
      });
    }

    function renderQuickRow() {
      quickRow.innerHTML = '';
      QUICK_REPLIES.forEach((item) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'quick-pill';
        button.textContent = item;
        button.addEventListener('click', () => sendQuick(item));
        quickRow.appendChild(button);
      });
    }

    function switchFaqBatch() {
      faqBatchIndex = (faqBatchIndex + 1) % FAQ_BATCHES.length;
      renderFaqBatch();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function addFiles(files, kind) {
      for (const file of files) {
        const dataUrl = await fileToDataUrl(file);
        attachments.push({
          kind,
          name: file.name,
          mimeType: file.type,
          dataUrl,
          size: file.size
        });
      }
      renderPreview();
    }

    imageInput.addEventListener('change', async (e) => {
      if (!e.target.files?.length) return;
      await addFiles(Array.from(e.target.files), 'image');
      e.target.value = '';
      setInputMode('text');
    });

    fileInput.addEventListener('change', async (e) => {
      if (!e.target.files?.length) return;
      await addFiles(Array.from(e.target.files), 'file');
      e.target.value = '';
      setInputMode('text');
    });

    function renderPreview() {
      previewRow.innerHTML = attachments.map((a, idx) => {
        const body = a.kind === 'image'
          ? `<img src="${a.dataUrl}" alt="${escapeHtml(a.name)}">`
          : `<audio controls src="${a.dataUrl}"></audio>`;
        return `<div class="preview">${body}<button class="remove" onclick="removeAttachment(${idx})">×</button></div>`;
      }).join('');
    }

    function removeAttachment(idx) {
      attachments.splice(idx, 1);
      renderPreview();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function attachmentSummary(items) {
      return items.map(a => ({ kind: a.kind, name: a.name, mimeType: a.mimeType, size: a.size, dataUrl: a.dataUrl }));
    }

    function addPost({ role, text, attachments = [], meta = null, typing = false }) {
      const post = document.createElement('article');
      post.className = 'post';

      const avatar = role === 'user' ? '我' : '薯';
      const who = role === 'user' ? '你' : 'AI 客服';
      const sub = role === 'user' ? '刚刚' : '系统回复';

      let body = '';
      if (typing) {
        body = '<div class="bubble bot"><span class="typing"><span></span><span></span><span></span></span></div>';
      } else if (text) {
        body = `<div class="bubble ${role}"><div class="bubble-wrap ${role}">${escapeHtml(text)}</div></div>`;
      }

      const media = attachments.length ? `<div class="media-grid">${attachments.map(a => {
        if (a.kind === 'image') {
          return `<div class="media"><img src="${a.dataUrl}" alt="${escapeHtml(a.name)}"><div class="caption">${escapeHtml(a.name)}</div></div>`;
        }
        if (a.kind === 'audio') {
          return `<div class="media"><div class="caption">🎧 ${escapeHtml(a.name)}</div><audio controls src="${a.dataUrl}"></audio></div>`;
        }
        if (a.kind === 'file') {
          return `<div class="media"><div class="caption">📎 ${escapeHtml(a.name)}</div></div>`;
        }
        return `<div class="media"><div class="caption">${escapeHtml(a.name)}</div></div>`;
      }).join('')}</div>` : '';

      post.innerHTML = `
        <div class="post-head">
          <div class="avatar">${avatar}</div>
          <div class="who"><strong>${who}</strong><span>${sub}</span></div>
        </div>
        ${body}
        ${media}
      `;

      chatArea.appendChild(post);
      chatArea.scrollTop = chatArea.scrollHeight;
      return post;
    }

    function renderTags(meta) {
      return '';
    }

    function addTyping() {
      return addPost({ role: 'bot', typing: true });
    }

    async function startVoiceRecord() {
      if (recording) {
        if (recorder && recorder.state !== 'inactive') recorder.stop();
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordedChunks = [];
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        recorder.onstop = async () => {
          const blob = new Blob(recordedChunks, { type: 'audio/webm' });
          const file = new File([blob], `voice-${Date.now()}.webm`, { type: blob.type });
          await addFiles([file], 'audio');
          stream.getTracks().forEach(t => t.stop());
          recording = false;
          voiceTrigger.textContent = '按住 说话';
          voiceTrigger.classList.remove('recording');
        };
        recorder.start();
        recording = true;
        voiceTrigger.textContent = '松开结束';
        voiceTrigger.classList.add('recording');
      } catch (e) {
        alert('无法开启麦克风，请检查浏览器权限。');
      }
    }

    voiceTrigger.addEventListener('pointerdown', () => {
      if (inputMode !== 'voice') return;
      voicePressStarted = false;
      voicePressTimer = setTimeout(() => {
        voicePressStarted = true;
        startVoiceRecord();
      }, 180);
    });

    voiceTrigger.addEventListener('pointerup', () => {
      clearTimeout(voicePressTimer);
      if (!voicePressStarted) return;
      if (recording && recorder && recorder.state !== 'inactive') recorder.stop();
    });

    voiceTrigger.addEventListener('pointercancel', () => {
      clearTimeout(voicePressTimer);
      if (!voicePressStarted) return;
      if (recording && recorder && recorder.state !== 'inactive') recorder.stop();
    });

    setInputMode('text');

    async function sendMsg() {
      const text = input.value.trim();
      if (!text && attachments.length === 0) return;
      sendBtn.disabled = true;

      const payloadAttachments = attachmentSummary(attachments);
      addPost({ role: 'user', text: text || '发送了附件', attachments: payloadAttachments });

      input.value = '';
      autoResize();
      attachments = [];
      renderPreview();

      const typingNode = addTyping();
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId, attachments: payloadAttachments })
        });
        const data = await res.json();
        typingNode.remove();
        addPost({
          role: 'bot',
          text: data.response?.content || '已收到。',
          meta: data.response || null
        });
      } catch (e) {
        typingNode.remove();
        addPost({ role: 'bot', text: '服务暂时不可用，我先帮你记下这条消息。', meta: { type: 'escalate', content: '当前无法完成自动回复。' } });
      }
      sendBtn.disabled = false;
      input.focus();
    }

    function sendQuick(text) {
      input.value = text;
      autoResize();
      sendMsg();
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    });

    const welcomePost = addPost({
      role: 'bot',
      text: '嗨，我在。你直接发一句话、图片或者语音都行。',
      meta: null
    });
    mountFaqPanel(welcomePost);
    renderFaqBatch();
    renderQuickRow();
    setInputMode('text');
  </script>
</body>
</html>
