<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电商客服 Agent 知识库 v1.1</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255,255,255,0.94);
      --card: #ffffff;
      --text: #221815;
      --muted: #8f7f78;
      --line: rgba(255, 111, 97, 0.12);
      --primary: #ff4d4f;
      --primary-2: #ff7a45;
      --accent: #ff2e63;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ececef 0%, #f8f8fa 100%);
      overflow: hidden;
    }

    .app {
      width: min(100vw, 430px);
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
    }

    .mobile-topbar {
      display: flex;
    }

    .stage {
      background: var(--panel);
      backdrop-filter: blur(20px);
      border: none;
      border-radius: 0;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .faq-panel {
      margin: 10px 12px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #fff, #fff7f4);
    }

    .quick-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 10px 10px;
      scrollbar-width: none;
    }
    .quick-row::-webkit-scrollbar { display: none; }

    .quick-pill {
      flex: 0 0 auto;
      border: 1px solid rgba(255,93,93,0.14);
      background: white;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: #503935;
      cursor: pointer;
      white-space: nowrap;
    }

    .faq-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .faq-head .title {
      font-size: 14px;
      font-weight: 700;
    }

    .faq-head .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .faq-switch {
      border: none;
      border-radius: 999px;
      background: rgba(255,93,93,0.08);
      color: var(--accent);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .faq-list {
      display: grid;
      gap: 10px;
    }

    .faq-item {
      border: 1px solid rgba(255,93,93,0.12);
      border-radius: 18px;
      background: white;
      padding: 12px 14px;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .faq-item:hover {
      transform: translateY(-1px);
      border-color: rgba(255,93,93,0.28);
      box-shadow: 0 10px 24px rgba(255,93,93,0.08);
    }

    .faq-q {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
    }

    .faq-a {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .profile {
      display: none;
    }

    .profile .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff8a5c, #ff5d5d);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
    }

    .profile .meta strong { display: block; font-size: 14px; }
    .profile .meta span { font-size: 12px; color: var(--muted); }

    .stage {
      display: flex;
      flex-direction: column;
      min-width: 0;
      flex: 1;
    }

    .topbar {
      padding: 14px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: rgba(255,255,255,0.96);
    }

    .topbar h2 { font-size: 16px; }
    .topbar .subtitle { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .live {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,93,93,0.08);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 0 6px rgba(255,45,99,0.12);
    }

    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 132px;
      scroll-behavior: smooth;
    }

    .post {
      max-width: 100%;
      margin: 0 0 14px;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
      animation: rise .28s ease;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px 6px;
    }

    .post-head .avatar {
      width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center;
      font-weight: 800; color: white;
      background: linear-gradient(135deg, #ff4d4f, #ff7a45);
      flex-shrink: 0;
    }

    .post-head .who strong { display: block; font-size: 14px; }
    .post-head .who span { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }

    .bubble {
      padding: 0;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user { color: var(--text); }
    .bubble.bot { color: #2f2722; }

    .bubble-wrap {
      display: inline-block;
      max-width: min(85%, 320px);
      margin: 0 14px 14px;
      padding: 11px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    }

    .bubble-wrap.bot {
      background: white;
      border: 1px solid rgba(0,0,0,0.05);
      border-top-left-radius: 8px;
      align-self: flex-start;
    }

    .bubble-wrap.user {
      background: linear-gradient(135deg, #ff4d4f, #ff7a45);
      color: white;
      border-top-right-radius: 8px;
      align-self: flex-end;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      padding: 0 14px 14px;
    }

    .media {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
      background: #fff;
      position: relative;
    }

    .media img, .media video {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #f6f6f6;
    }

    .media .caption {
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid rgba(0,0,0,0.04);
      background: #fffdfc;
    }

    .audio-wrap {
      padding: 0 14px 14px;
    }

    .audio-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, #fff7f5, #fff);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .audio-badge {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #ff5d5d, #ff8a5c);
      color: white; display: grid; place-items: center;
      flex-shrink: 0;
    }

    .audio-box audio { width: 100%; }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .tag {
      font-size: 12px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,93,93,0.08);
      color: var(--accent);
      font-weight: 700;
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 2px 0;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: #ff7a7a; animation: bounce 1.1s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.72); opacity: .45; } 40% { transform: scale(1); opacity: 1; } }

    .toolbar {
      padding: 10px 10px 12px;
      border-top: 1px solid rgba(0,0,0,0.05);
      background: rgba(255,255,255,0.98);
    }

    .attachments {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,93,93,0.14);
      background: white;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #503935;
    }

    .chip.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      border-color: transparent;
      color: white;
      font-weight: 700;
    }

    .chip.recording {
      background: rgba(255,45,99,0.1);
      color: var(--accent);
      border-color: rgba(255,45,99,0.16);
    }

    .composer {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .composer textarea {
      flex: 1;
      min-height: 54px;
      max-height: 130px;
      resize: none;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
      background: white;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }

    .composer textarea:focus { border-color: rgba(255,93,93,0.4); box-shadow: 0 0 0 4px rgba(255,93,93,0.06); }

    .send {
      width: 50px; height: 50px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white; cursor: pointer; font-size: 18px; font-weight: 800;
      box-shadow: 0 12px 24px rgba(255,93,93,0.22);
    }
    .send:disabled { opacity: .5; cursor: not-allowed; }

    .preview-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .preview {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
      background: #fff;
    }
    .preview img, .preview audio, .preview video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .preview .remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px; height: 24px;
      border: none; border-radius: 50%;
      background: rgba(0,0,0,0.62);
      color: white; cursor: pointer;
      line-height: 1;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      body { overflow: hidden; }
      .app {
        width: min(100vw, 430px);
        height: 100vh;
        padding: 0;
        gap: 0;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 12px 12px 10px;
        border-radius: 0;
      }
      .feed {
        padding: 12px 10px 126px;
        min-height: 0;
      }
      .post {
        max-width: 100%;
        border-radius: 18px;
      }
      .toolbar {
        position: sticky;
        bottom: 0;
        z-index: 12;
        padding: 10px 10px 12px;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
        box-shadow: 0 -12px 30px rgba(0,0,0,0.05);
      }
      .faq-panel {
        margin: 10px 10px 0;
        padding: 12px;
      }
      .preview-row {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 4px;
      }
      .desktop-topbar { display: none; }
      .mobile-topbar { display: flex; }
      .sidebar { display: none; }
    }

    @media (max-width: 640px) {
      .topbar h2 { font-size: 15px; }
      .topbar .subtitle { font-size: 11px; }
      .live { padding: 8px 10px; }
      .faq-panel { padding: 12px; }
      .faq-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .faq-switch { align-self: flex-start; }
      .composer { flex-wrap: nowrap; }
      .composer textarea { min-height: 46px; border-radius: 16px; }
      .send { width: 46px; height: 46px; border-radius: 16px; flex-shrink: 0; }
      .media-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-row">
          <div class="logo">薯</div>
          <div>
            <h1>小红书风客服</h1>
            <p>图片、语音、文字都能发</p>
          </div>
        </div>
      </div>
      <div class="nav">
        <div class="nav-card"><strong>热门话题</strong><span>查订单 / 售后</span></div>
        <div class="nav-card"><strong>种草图文</strong><span>支持图片上传</span></div>
        <div class="nav-card"><strong>语音消息</strong><span>支持录音发送</span></div>
      </div>
      <div class="promo">
        <div class="title">知识库 v1.1 已接入</div>
        <div class="text">这版已合并项目背景、场景优先级、冷启动策略、自建架构、灰度上线、评测体系和安全护栏。上传图片后会显示卡片预览，语音会作为音频消息展示。</div>
      </div>
      <div class="faq-panel">
        <div class="faq-head">
          <div>
            <div class="title">常见问答</div>
            <div class="hint">先看这批高频问题，点一下就能直接发给客服</div>
          </div>
          <button class="faq-switch" type="button" onclick="switchFaqBatch()">换一批</button>
        </div>
        <div class="faq-list" id="faqList"></div>
      </div>
      <div class="profile">
        <div class="avatar">U</div>
        <div class="meta"><strong>用户中心</strong><span>在线 · 这条会话已开启</span></div>
      </div>
    </aside>

    <main class="stage">
      <div class="topbar mobile-topbar">
        <div>
          <h2>红薯客服</h2>
          <div class="subtitle">私信 · 在线客服 · 7×24</div>
        </div>
        <div class="live"><span class="dot"></span> Live</div>
      </div>

      <div class="feed" id="chatArea"></div>

      <div class="toolbar">
        <div class="quick-row" id="quickRow"></div>
        <div class="attachments">
          <button class="chip primary" type="button" onclick="pickImages()">+ 图片</button>
          <button class="chip primary" type="button" onclick="pickAudio()">+ 语音</button>
          <button class="chip" type="button" id="recordBtn" onclick="toggleRecord()">🎙️ 开始录音</button>
          <input class="hidden" id="imageInput" type="file" accept="image/*" multiple>
          <input class="hidden" id="audioInput" type="file" accept="audio/*">
        </div>
        <div class="composer">
          <textarea id="msgInput" placeholder="像发小红书私信一样聊，试试发一张图或一句语音…" rows="1"></textarea>
          <button class="send" id="sendBtn" onclick="sendMsg()">➤</button>
        </div>
        <div class="preview-row" id="previewRow"></div>
      </div>
    </main>
  </div>

  <script>
    const API = '/api/chat';
    const chatArea = document.getElementById('chatArea');
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageInput = document.getElementById('imageInput');
    const audioInput = document.getElementById('audioInput');
    const previewRow = document.getElementById('previewRow');
    const recordBtn = document.getElementById('recordBtn');
    const faqList = document.getElementById('faqList');
    const quickRow = document.getElementById('quickRow');

    let sessionId = 'user_' + Date.now();
    let attachments = [];
    let recorder = null;
    let recordedChunks = [];
    let recording = false;
    let faqBatchIndex = 0;

    const FAQ_BATCHES = [
      [
        { q: '我的订单到哪了？', a: '查订单状态' },
        { q: '我的快递到哪了？', a: '查物流轨迹' },
        { q: '怎么申请退款？', a: '查退款流程' },
        { q: '订单为什么还没发货？', a: '查发货时效' }
      ],
      [
        { q: '退款什么时候到账？', a: '查退款进度' },
        { q: '订单显示已签收但我没收到怎么办？', a: '查签收异常' },
        { q: '快递破损了怎么办？', a: '查售后处理' },
        { q: '能改收货地址吗？', a: '查改址规则' }
      ],
      [
        { q: '商品发错了怎么处理？', a: '查错发售后' },
        { q: '为什么物流信息不更新？', a: '查物流延迟' },
        { q: '七天无理由退货怎么操作？', a: '查退货规则' },
        { q: '可以转人工吗？', a: '转人工客服' }
      ]
    ];

    const QUICK_REPLIES = ['查订单状态', '查物流', '查退款进度', '转人工'];

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 130) + 'px';
    }

    input.addEventListener('input', autoResize);

    function pickImages() { imageInput.click(); }
    function pickAudio() { audioInput.click(); }

    function renderFaqBatch() {
      const batch = FAQ_BATCHES[faqBatchIndex % FAQ_BATCHES.length];
      faqList.innerHTML = batch.map((item, idx) => `
        <div class="faq-item" onclick="sendQuick(${JSON.stringify(item.q)})">
          <div class="faq-q">${idx + 1}. ${escapeHtml(item.q)}</div>
          <div class="faq-a">${escapeHtml(item.a)}</div>
        </div>
      `).join('');
    }

    function renderQuickRow() {
      quickRow.innerHTML = QUICK_REPLIES.map(item => `
        <button class="quick-pill" type="button" onclick="sendQuick(${JSON.stringify(item)})">${escapeHtml(item)}</button>
      `).join('');
    }

    function switchFaqBatch() {
      faqBatchIndex = (faqBatchIndex + 1) % FAQ_BATCHES.length;
      renderFaqBatch();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function addFiles(files, kind) {
      for (const file of files) {
        const dataUrl = await fileToDataUrl(file);
        attachments.push({
          kind,
          name: file.name,
          mimeType: file.type,
          dataUrl,
          size: file.size
        });
      }
      renderPreview();
    }

    imageInput.addEventListener('change', async (e) => {
      if (!e.target.files?.length) return;
      await addFiles(Array.from(e.target.files), 'image');
      e.target.value = '';
    });

    audioInput.addEventListener('change', async (e) => {
      if (!e.target.files?.length) return;
      await addFiles(Array.from(e.target.files), 'audio');
      e.target.value = '';
    });

    function renderPreview() {
      previewRow.innerHTML = attachments.map((a, idx) => {
        const body = a.kind === 'image'
          ? `<img src="${a.dataUrl}" alt="${escapeHtml(a.name)}">`
          : `<audio controls src="${a.dataUrl}"></audio>`;
        return `<div class="preview">${body}<button class="remove" onclick="removeAttachment(${idx})">×</button></div>`;
      }).join('');
    }

    function removeAttachment(idx) {
      attachments.splice(idx, 1);
      renderPreview();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function attachmentSummary(items) {
      return items.map(a => ({ kind: a.kind, name: a.name, mimeType: a.mimeType, size: a.size, dataUrl: a.dataUrl }));
    }

    function addPost({ role, text, attachments = [], meta = null, typing = false }) {
      const post = document.createElement('article');
      post.className = 'post';

      const avatar = role === 'user' ? '我' : '薯';
      const who = role === 'user' ? '你' : 'AI 客服';
      const sub = role === 'user' ? '刚刚' : '系统回复';

      let body = '';
      if (typing) {
        body = '<div class="bubble bot"><span class="typing"><span></span><span></span><span></span></span></div>';
      } else if (text) {
        body = `<div class="bubble ${role}"><div class="bubble-wrap ${role}">${escapeHtml(text)}</div></div>`;
      }

      const media = attachments.length ? `<div class="media-grid">${attachments.map(a => {
        if (a.kind === 'image') {
          return `<div class="media"><img src="${a.dataUrl}" alt="${escapeHtml(a.name)}"><div class="caption">${escapeHtml(a.name)}</div></div>`;
        }
        if (a.kind === 'audio') {
          return `<div class="media"><div class="caption">🎧 ${escapeHtml(a.name)}</div><audio controls src="${a.dataUrl}"></audio></div>`;
        }
        return `<div class="media"><div class="caption">${escapeHtml(a.name)}</div></div>`;
      }).join('')}</div>` : '';

      const tags = meta?.type ? `<div class="tags">${renderTags(meta)}</div>` : '';

      post.innerHTML = `
        <div class="post-head">
          <div class="avatar">${avatar}</div>
          <div class="who"><strong>${who}</strong><span>${sub}</span></div>
        </div>
        ${body}
        ${media}
        ${tags}
      `;

      chatArea.appendChild(post);
      chatArea.scrollTop = chatArea.scrollHeight;
      return post;
    }

    function renderTags(meta) {
      const items = [];
      if (meta.type === 'order') items.push('订单详情');
      if (meta.type === 'order_list') items.push('订单列表');
      if (meta.type === 'logistics') items.push('物流轨迹');
      if (meta.type === 'refund') items.push('退款进度');
      if (meta.type === 'escalate') items.push('人工客服');
      return items.concat(meta.content ? [meta.content] : []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
    }

    function addTyping() {
      return addPost({ role: 'bot', typing: true });
    }

    async function toggleRecord() {
      if (recording) {
        if (recorder && recorder.state !== 'inactive') recorder.stop();
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordedChunks = [];
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        recorder.onstop = async () => {
          const blob = new Blob(recordedChunks, { type: 'audio/webm' });
          const file = new File([blob], `voice-${Date.now()}.webm`, { type: blob.type });
          await addFiles([file], 'audio');
          stream.getTracks().forEach(t => t.stop());
          recording = false;
          recordBtn.textContent = '🎙️ 开始录音';
          recordBtn.classList.remove('recording');
        };
        recorder.start();
        recording = true;
        recordBtn.textContent = '⏺️ 结束录音';
        recordBtn.classList.add('recording');
      } catch (e) {
        alert('无法开启麦克风，请检查浏览器权限。');
      }
    }

    async function sendMsg() {
      const text = input.value.trim();
      if (!text && attachments.length === 0) return;
      sendBtn.disabled = true;

      const payloadAttachments = attachmentSummary(attachments);
      addPost({ role: 'user', text: text || '发送了附件', attachments: payloadAttachments });

      input.value = '';
      autoResize();
      attachments = [];
      renderPreview();

      const typingNode = addTyping();
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId, attachments: payloadAttachments })
        });
        const data = await res.json();
        typingNode.remove();
        addPost({
          role: 'bot',
          text: data.response?.content || '已收到。',
          meta: data.response || null
        });
      } catch (e) {
        typingNode.remove();
        addPost({ role: 'bot', text: '服务暂时不可用，我先帮你记下这条消息。', meta: { type: 'escalate', content: '当前无法完成自动回复。' } });
      }
      sendBtn.disabled = false;
      input.focus();
    }

    function sendQuick(text) {
      input.value = text;
      autoResize();
      sendMsg();
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    });

    addPost({
      role: 'bot',
      text: '欢迎来到小红书风客服页。知识库已升级到 v1.1，你可以直接发文字，也可以上传图片或录一段语音，我会按社区私信的方式展示。',
      meta: { type: 'order_list', content: '支持图片/语音附件' }
    });
    renderFaqBatch();
    renderQuickRow();
  </script>
</body>
</html>
