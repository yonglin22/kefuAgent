<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>红薯客服</title>
  <style>
    :root { --primary:#ff4d4f; --primary2:#ff7a45; --text:#241b18; --muted:#8f7f78; }
    *{box-sizing:border-box} html,body{margin:0;height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,122,69,.16), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,77,79,.12), transparent 34%),
        linear-gradient(180deg,#fffaf8 0%,#fff 100%);
    }
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{
      width:min(100%,420px);border:1px solid rgba(255,93,93,.10);border-radius:28px;
      background:rgba(255,255,255,.9);box-shadow:0 20px 50px rgba(255,93,93,.10);overflow:hidden
    }
    .hero{padding:26px 20px 18px;border-bottom:1px solid rgba(0,0,0,.05)}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,93,93,.08);color:var(--primary);font-size:12px;font-weight:700}
    h1{margin:14px 0 0;font-size:30px;line-height:1.1}
    .sub{margin-top:10px;color:var(--muted);font-size:14px;line-height:1.7}
    .cta{padding:18px 20px 22px;display:grid;gap:10px}
    .btn{
      display:flex;align-items:center;justify-content:center;text-decoration:none;min-height:54px;border-radius:16px;
      font-size:15px;font-weight:800;transition:transform .15s ease;user-select:none
    }
    .btn:active{transform:scale(.99)}
    .primary{color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 14px 24px rgba(255,93,93,.22)}
    .secondary{color:var(--text);background:#fff;border:1px solid rgba(0,0,0,.08)}
    .tips{padding:0 20px 22px;color:var(--muted);font-size:12px;line-height:1.6}
    .link{word-break:break-all}
    @media (max-width:480px){.wrap{padding:12px;align-items:flex-start}.card{width:100%;border-radius:24px}h1{font-size:26px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div class="badge">微信一键打开</div>
        <h1>红薯客服</h1>
        <div class="sub">点一下直接进客服聊天页。适合微信里一键打开，也可复制链接到浏览器。</div>
      </div>
      <div class="cta">
        <a class="btn primary" id="openChatBtn" href="/chat.html">一键打开客服</a>
        <a class="btn secondary" id="copyBtn" href="javascript:void(0)">复制链接</a>
      </div>
      <div class="tips">微信里如果点不开，先点右上角菜单，选择“在浏览器中打开”。<br><span class="link" id="linkText"></span></div>
    </div>
  </div>
  <script>
    const PROD_CHAT_URL = 'https://cs-agent-ashy.vercel.app/chat.html?v=20260604';
    const openChatBtn = document.getElementById('openChatBtn');
    const copyBtn = document.getElementById('copyBtn');
    const linkText = document.getElementById('linkText');
    const targetUrl = location.protocol === 'file:' ? PROD_CHAT_URL : (location.origin + '/chat.html?v=20260604');
    openChatBtn.href = targetUrl;
    linkText.textContent = targetUrl;
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(targetUrl);
        copyBtn.textContent = '已复制';
        setTimeout(() => (copyBtn.textContent = '复制链接'), 1200);
      } catch (e) {
        alert(targetUrl);
      }
    });
  </script>
</body>
</html>
