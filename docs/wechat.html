<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>微信打开客服</title>
  <style>
    :root { --p:#ff4d4f; --p2:#ff7a45; --t:#241b18; --m:#8f7f78; }
    *{box-sizing:border-box} html,body{margin:0;height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--t);
      background:linear-gradient(180deg,#fffaf8 0%,#fff 100%);
    }
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{
      width:min(100%,420px);border:1px solid rgba(255,93,93,.10);border-radius:28px;
      background:rgba(255,255,255,.96);box-shadow:0 20px 50px rgba(255,93,93,.10);overflow:hidden
    }
    .hero{padding:24px 20px 18px;border-bottom:1px solid rgba(0,0,0,.05)}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,93,93,.08);color:var(--p);font-size:12px;font-weight:700}
    h1{margin:14px 0 0;font-size:28px;line-height:1.1}
    .sub{margin-top:10px;color:var(--m);font-size:14px;line-height:1.7}
    .cta{padding:18px 20px 22px;display:grid;gap:10px}
    .btn{
      display:flex;align-items:center;justify-content:center;text-decoration:none;min-height:54px;border-radius:16px;
      font-size:15px;font-weight:800;transition:transform .15s ease;user-select:none
    }
    .btn:active{transform:scale(.99)}
    .primary{color:#fff;background:linear-gradient(135deg,var(--p),var(--p2));box-shadow:0 14px 24px rgba(255,93,93,.22)}
    .secondary{color:var(--t);background:#fff;border:1px solid rgba(0,0,0,.08)}
    .tips{padding:0 20px 22px;color:var(--m);font-size:12px;line-height:1.6;word-break:break-all}
    @media (max-width:480px){.wrap{padding:12px;align-items:flex-start}.card{width:100%;border-radius:24px}h1{font-size:24px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div class="badge">微信专用入口</div>
        <h1>红薯客服</h1>
        <div class="sub">如果微信里之前的链接还显示旧内容，请直接点下面这个新入口。</div>
      </div>
      <div class="cta">
        <a class="btn primary" id="openChatBtn" href="#">打开最新客服页</a>
        <a class="btn secondary" id="copyBtn" href="javascript:void(0)">复制新链接</a>
      </div>
      <div class="tips" id="linkText"></div>
    </div>
  </div>
  <script>
    const CHAT_URL = 'https://yonglin22.github.io/kefuAgent/chat-v8.html?wx=20260604';
    const openChatBtn = document.getElementById('openChatBtn');
    const copyBtn = document.getElementById('copyBtn');
    const linkText = document.getElementById('linkText');
    openChatBtn.href = CHAT_URL;
    linkText.textContent = CHAT_URL;
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(CHAT_URL);
        copyBtn.textContent = '已复制';
        setTimeout(() => (copyBtn.textContent = '复制新链接'), 1200);
      } catch (e) {
        alert(CHAT_URL);
      }
    });
  </script>
</body>
</html>
